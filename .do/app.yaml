name: postiz
region: nyc

databases:
  - engine: PG
    name: db
    production: true
    version: "16"

services:
  - name: postiz
    github:
      repo: appolabs/postiz-app
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile.dev
    http_port: 5000
    instance_size_slug: apps-s-1vcpu-2gb
    instance_count: 1
    health_check:
      http_path: /
      initial_delay_seconds: 120
      period_seconds: 10
      timeout_seconds: 5
      failure_threshold: 6
    envs:
      # --- App URLs (DO bindings) ---
      - key: MAIN_URL
        value: "${APP_URL}"
      - key: FRONTEND_URL
        value: "${APP_URL}"
      - key: NEXT_PUBLIC_BACKEND_URL
        value: "${APP_URL}/api"
        scope: BUILD_TIME
      # --- Database (DO managed PG binding) ---
      - key: DATABASE_URL
        value: "${db.DATABASE_URL}?sslmode=no-verify"
      # --- Temporal (embedded mode) ---
      - key: TEMPORAL_EMBEDDED
        value: "true"
      - key: TEMPORAL_ADDRESS
        value: "localhost:7233"
      # --- Temporal auto-setup (DO managed PG bindings) ---
      - key: DB_PORT
        value: "${db.PORT}"
      - key: POSTGRES_SEEDS
        value: "${db.HOSTNAME}"
      - key: POSTGRES_USER
        value: "${db.USERNAME}"
      - key: POSTGRES_PWD
        value: "${db.PASSWORD}"
        type: SECRET
